<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>留友看 Hinata Ver.</title>
    <link rel="icon" type="image/jpeg" href="https://cdn.hinatazaka46.com/images/14/1e6/c3049a93d54c3f9a8ded4694e158b/400_320_102400.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { overflow-x: hidden; width: 100%; }
        body { overflow-x: hidden; max-width: 100vw; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 自適應瀑布流 */
        .masonry-grid { column-count: 2; column-gap: 0.75rem; }
        @media (min-width: 640px) { .masonry-grid { column-gap: 1.25rem; } }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }
        .masonry-item { break-inside: avoid; margin-bottom: 0.75rem; }
        @media (min-width: 640px) { .masonry-item { margin-bottom: 1.25rem; } }
        
        /* 輪播滾動行為 */
        .carousel-track { scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .carousel-slide { scroll-snap-align: center; }
        .dot { transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .dot.active { width: 20px; border-radius: 9999px; background-color: #0ea5e9; }

        /* 過場動畫 */
        @keyframes slideUp {
            from { transform: translateY(16px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, 10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .animate-slide-up { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-slate-50/50 text-slate-800 font-sans antialiased pb-24 min-h-screen relative overflow-x-hidden select-none sm:select-text">
    
    <!-- 日向天藍色主題柔和背景光暈 -->
    <div class="absolute top-0 left-1/4 w-[400px] h-[400px] bg-sky-200/20 rounded-full filter blur-3xl pointer-events-none -z-10"></div>
    <div class="absolute top-1/4 right-1/4 w-[350px] h-[350px] bg-sky-100/30 rounded-full filter blur-3xl pointer-events-none -z-10"></div>

    <!-- 頂部導覽 -->
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100/80 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center gap-4">
            <h1 class="text-lg sm:text-xl font-black tracking-widest text-slate-900 whitespace-nowrap select-none">
                <span class="bg-gradient-to-r from-sky-400 to-sky-500 bg-clip-text text-transparent">留友看</span> <span class="text-[10px] sm:text-xs font-bold text-sky-400/80 tracking-normal">Hinata Ver.</span>
            </h1>
            <div class="flex items-center gap-2.5">
                <button onclick="openFolderCreate()" title="新增收藏分類" class="w-9 h-9 rounded-full bg-white shadow-sm border border-slate-100/80 flex items-center justify-center text-base transition hover:bg-slate-50 active:scale-90">📁</button>
                <button id="account-btn" onclick="openAccountSettings()" title="登入 / 我的帳號" class="w-9 h-9 rounded-full bg-sky-500 text-white flex items-center justify-center text-sm font-bold transition overflow-hidden shadow-sm active:scale-90 ring-2 ring-white">
                    <span id="account-initial">?</span>
                    <img id="account-img" class="w-full h-full object-cover hidden" src="" alt="avatar">
                </button>
            </div>
        </div>

        <nav class="max-w-7xl mx-auto px-4 sm:px-6 pb-3 flex">
            <div class="bg-slate-200/40 p-1 rounded-2xl flex w-fit shadow-inner">
                <button onclick="switchLayer('explore')" id="tab-explore" class="px-4 sm:px-5 py-2 text-xs font-black rounded-xl bg-white shadow-sm text-slate-900 transition-all duration-300">🏠 首頁</button>
                <button onclick="switchLayer('subs')" id="tab-subs" class="px-4 sm:px-5 py-2 text-xs font-black rounded-xl text-slate-500 hover:text-slate-900 transition-all duration-300">🔔 訂閱標籤</button>
                <button onclick="switchLayer('playlists')" id="tab-playlists" class="px-4 sm:px-5 py-2 text-xs font-black rounded-xl text-slate-500 hover:text-slate-900 transition-all duration-300">✨ 精華區</button>
                <button onclick="switchLayer('folders')" id="tab-folders" class="px-4 sm:px-5 py-2 text-xs font-black rounded-xl text-slate-500 hover:text-slate-900 transition-all duration-300">📁 個人收藏</button>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 pt-2">
        <!-- 分類滾動區塊 -->
        <section id="category-section" class="mb-6">
            <div id="category-scroll" class="flex gap-3 sm:gap-4 overflow-x-auto hide-scrollbar pb-1 scroll-smooth"></div>
        </section>

        <!-- [新增] 第四層：公開分享資料夾專用檢視區（預設隱藏） -->
        <section id="layer-shared" class="layer-section hidden transition-opacity duration-300">
            <div class="bg-gradient-to-r from-sky-400/10 to-transparent p-5 sm:p-6 rounded-3xl border border-sky-100 mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div>
                    <span id="shared-owner-badge" class="text-[10px] font-black uppercase tracking-wider bg-sky-100 text-sky-600 px-2.5 py-1 rounded-lg">公開分享</span>
                    <h2 id="shared-folder-title" class="text-xl font-black text-slate-800 mt-2"></h2>
                    <p id="shared-folder-desc" class="text-xs text-slate-400 mt-1"></p>
                </div>
                <div class="flex items-center gap-2 flex-shrink-0 self-start sm:self-auto">
                    <button onclick="toggleViewMode()" class="view-toggle-btn text-xs font-bold bg-white border border-sky-100 rounded-xl px-3 py-2.5 text-slate-500 shadow-sm hover:bg-sky-50 transition active:scale-95">☰ 清單</button>
                    <button onclick="exitSharedView()" class="bg-slate-900 hover:bg-slate-800 text-white text-xs font-black px-5 py-3 rounded-xl transition shadow-sm active:scale-95 whitespace-nowrap">🏠 前往首頁探索更多</button>
                </div>
            </div>
            <div id="shared-videos-grid" class="masonry-grid"></div>
        </section>

        <!-- 第一層：首頁 -->
        <section id="layer-explore" class="layer-section transition-opacity duration-300">
            <!-- 🎲 隨機回味區塊 -->
            <div class="bg-white rounded-3xl p-4 sm:p-6 mb-6 border border-slate-100/80 shadow-[0_8px_30px_rgb(14,165,233,0.01)]">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <span class="text-base sm:text-lg">🎲</span>
                        <h2 class="text-sm sm:text-base font-black text-slate-800 tracking-wider">隨機回味</h2>
                    </div>
                    <button onclick="shuffleRandom()" class="bg-sky-500 hover:bg-sky-600 text-white text-[10px] sm:text-[11px] font-black px-4 py-2 rounded-full shadow-md shadow-sky-500/10 transition active:scale-95">換一批</button>
                </div>
                <div id="random-track" class="carousel-track flex overflow-x-auto hide-scrollbar gap-4 sm:gap-5 pb-2"></div>
                <div id="random-dots" class="flex justify-center gap-2 mt-3"></div>
            </div>

            <!-- 搜尋框區塊 -->
            <div class="mb-6">
                <div class="relative max-w-xl">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔍</span>
                    <input id="search-input" type="text" placeholder="搜尋影片標籤或標題..." class="w-full bg-white border border-slate-100 rounded-2xl py-3 pl-11 pr-5 text-sm shadow-[0_4px_20px_rgb(0,0,0,0.01)] focus:outline-none focus:ring-2 focus:ring-sky-200 transition-all duration-300" oninput="renderExplore()">
                </div>
            </div>

            <!-- 影片牆區塊 -->
            <div class="mb-4 sm:mb-6 flex justify-between items-center border-t border-slate-200/40 pt-6 sm:pt-8">
                <h2 class="text-sm sm:text-base font-black text-slate-800 tracking-wider">影片牆</h2>
                <div class="flex items-center gap-2">
                    <button onclick="toggleViewMode()" class="view-toggle-btn text-xs font-bold bg-white border border-slate-200/60 rounded-xl px-3 py-2 text-slate-500 shadow-sm hover:bg-slate-50 transition active:scale-95">☰ 清單</button>
                    <select id="sort-select" onchange="renderExplore()" class="text-xs font-bold bg-white border border-slate-200/60 rounded-xl px-3 py-2 focus:outline-none cursor-pointer shadow-sm hover:bg-slate-50 transition">
                        <option value="newest">最新加入</option>
                        <option value="popular">最熱門</option>
                    </select>
                </div>
            </div>
            <div id="explore-grid" class="masonry-grid"><p class="text-slate-500 text-sm py-10 text-center col-span-full block w-full">正在同步最新資料...</p></div>
        </section>

        <!-- 第二層：專屬訂閱 -->
        <section id="layer-subs" class="layer-section hidden transition-opacity duration-300">
            <div class="mb-6 bg-white p-5 sm:p-6 rounded-3xl border border-slate-100 shadow-[0_8px_30px_rgb(0,0,0,0.01)]">
                <div class="flex justify-between items-start mb-1.5 gap-3">
                    <h2 class="text-sm sm:text-base font-black text-slate-800 tracking-wider">專屬標籤追蹤</h2>
                    <button onclick="toggleViewMode()" class="view-toggle-btn text-xs font-bold bg-slate-50 border border-slate-200/60 rounded-xl px-3 py-2 text-slate-500 shadow-sm hover:bg-slate-100 transition active:scale-95 flex-shrink-0">☰ 清單</button>
                </div>
                <p class="text-xs text-slate-400 mb-4">點擊標籤直接檢視影片，點擊 ⭐ 新增/取消訂閱</p>
                
                <div class="relative max-w-xs mb-5">
                    <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-xs">🔍</span>
                    <input id="tag-search-input" type="text" placeholder="快速尋找成員或活動標籤..." class="w-full bg-slate-50 border border-slate-100 rounded-xl py-2 pl-9 pr-4 text-xs focus:outline-none focus:ring-2 focus:ring-sky-200 transition-all" oninput="renderSubs()">
                </div>

                <div class="mb-4">
                    <h3 class="text-xs font-bold text-slate-400 mb-2.5 flex items-center gap-1"><span>⭐</span> 我的追蹤</h3>
                    <div id="subs-tags-active" class="flex gap-2 flex-wrap"></div>
                </div>

                <div class="border-t border-slate-100 my-4"></div>

                <div>
                    <h3 class="text-xs font-bold text-slate-400 mb-2.5 flex items-center gap-1"><span>🏷️</span> 所有標籤</h3>
                    <div id="subs-tags-all" class="flex gap-2 flex-wrap max-h-40 overflow-y-auto hide-scrollbar pr-1"></div>
                </div>
            </div>
            
            <div id="subs-grid" class="masonry-grid"><p class="text-slate-500 text-sm py-10 text-center col-span-full block w-full">請點選上方標籤過濾影片</p></div>
        </section>

        <!-- 第三層：精華區（主題懶人包） -->
        <section id="layer-playlists" class="layer-section hidden transition-opacity duration-300">
            <!-- 懶人包列表 -->
            <div id="playlists-main-view" class="space-y-4">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-sm sm:text-base font-black text-slate-800 tracking-wider">✨ 主題懶人包</h2>
                </div>
                <div id="playlists-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </div>

            <!-- 單一懶人包內容 -->
            <div id="playlist-view" class="hidden">
                <div class="flex flex-wrap justify-between items-center gap-3 mb-5">
                    <button onclick="closePlaylistView()" class="flex items-center gap-2 text-xs font-bold text-slate-600 hover:text-slate-900 transition bg-white px-4 py-2.5 rounded-xl shadow-sm border border-slate-100 active:scale-95">
                        <span>⬅</span> 返回列表
                    </button>
                    <button onclick="toggleViewMode()" class="view-toggle-btn text-xs font-bold text-slate-600 hover:text-slate-900 bg-white px-4 py-2.5 rounded-xl shadow-sm border border-slate-100 active:scale-95">☰ 清單</button>
                </div>
                <h2 id="playlist-view-title" class="text-lg sm:text-xl font-black text-slate-800 tracking-wider mb-1.5"></h2>
                <p id="playlist-view-desc" class="text-xs text-slate-400 mb-5"></p>
                <div id="playlist-videos-grid" class="masonry-grid"></div>
            </div>
        </section>

        <!-- 第四層：個人收藏夾 -->
        <section id="layer-folders" class="layer-section hidden transition-opacity duration-300">
            <div id="folder-login-prompt" class="hidden text-center py-16 bg-white rounded-3xl border border-slate-100 shadow-[0_8px_30px_rgb(0,0,0,0.01)] max-w-md mx-auto">
                <span class="text-4xl block mb-4">🔐</span>
                <h3 class="text-base font-black text-slate-800 mb-2">這是您的專屬私密空間</h3>
                <p class="text-xs text-slate-400 px-8 leading-relaxed mb-6">個人收藏夾採用個人化雲端儲存，登入帳號後即可跨裝置同步並建立您的專屬收藏清單。</p>
                <button onclick="openAccountSettings()" class="bg-sky-500 hover:bg-sky-600 text-white text-xs font-black px-6 py-3 rounded-full transition shadow-md active:scale-95">登入帳號</button>
            </div>

            <!-- 資料夾列表 -->
            <div id="folders-main-view" class="space-y-4">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-sm sm:text-base font-black text-slate-800 tracking-wider">我的收藏夾</h2>
                </div>
                <div id="folders-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </div>
            
            <!-- 單一資料夾內容 -->
            <div id="folder-view" class="hidden">
                <div class="flex flex-wrap justify-between items-center gap-3 mb-5">
                    <button onclick="closeFolderView()" class="flex items-center gap-2 text-xs font-bold text-slate-600 hover:text-slate-900 transition bg-white px-4 py-2.5 rounded-xl shadow-sm border border-slate-100 active:scale-95">
                        <span>⬅</span> 返回列表
                    </button>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleViewMode()" class="view-toggle-btn text-xs font-bold text-slate-600 hover:text-slate-900 bg-white px-4 py-2.5 rounded-xl shadow-sm border border-slate-100 active:scale-95">☰ 清單</button>
                        <!-- [新增] 分享資料夾按鈕 -->
                        <button id="btn-share-folder" class="text-xs font-bold text-sky-600 hover:bg-sky-50 bg-white px-4 py-2.5 rounded-xl shadow-sm border border-slate-100 active:scale-95">🔗 分享</button>
                        <button id="btn-edit-folder" class="text-xs font-bold text-slate-600 hover:text-slate-900 bg-white px-4 py-2.5 rounded-xl shadow-sm border border-slate-100 active:scale-95">⚙️ 修改</button>
                        <button id="btn-delete-folder" class="text-xs font-bold text-red-500 hover:text-red-700 hover:bg-red-50 bg-white px-4 py-2.5 rounded-xl shadow-sm border border-slate-100 active:scale-95">🗑️ 刪除</button>
                    </div>
                </div>
                <h2 id="folder-view-title" class="text-lg sm:text-xl font-black text-slate-800 tracking-wider mb-5"></h2>
                <div id="folder-videos-grid" class="masonry-grid"></div>
            </div>
        </section>
    </main>

    <!-- 帳號設定彈窗 -->
    <div id="account-modal" class="fixed inset-0 bg-slate-950/20 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4 transition-opacity duration-300" onclick="if(event.target===this) closeAccountModal()">
        <div class="bg-white rounded-3xl max-w-sm w-full p-6 shadow-2xl relative border border-slate-100 animate-slide-up">
            <button onclick="closeAccountModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-900 text-xl font-bold w-8 h-8 flex items-center justify-center">&times;</button>
            <h2 class="text-sm sm:text-base font-black mb-4 text-slate-900">帳號設定</h2>
            
            <div id="login-section" class="hidden">
                <p class="text-xs text-slate-400 mb-6 leading-relaxed">登入後即可建立您的專屬收藏夾、訂閱標籤，並在不同裝置間同步。</p>
                <button onclick="handleLogin()" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-extrabold py-3.5 rounded-2xl transition shadow-md active:scale-95">使用 Google 帳號登入</button>
            </div>

            <div id="profile-section" class="hidden">
                <p class="text-xs font-bold text-slate-800 mb-3">選擇預設頭像</p>
                <div class="grid grid-cols-4 gap-3 mb-8" id="avatar-choices">
                    <img src="https://cdn.hinatazaka46.com/files/14/diary/official/member/poka_0607_3_fshshehsioheofef09w390wj903f3wfw33f.png" class="w-14 h-14 rounded-full cursor-pointer hover:ring-4 hover:ring-sky-100 transition avatar-option" onclick="selectAvatar(this.src)">
                    <img src="https://cdn.hinatazaka46.com/images/14/1e6/c3049a93d54c3f9a8ded4694e158b/400_320_102400.jpg" class="w-14 h-14 rounded-full cursor-pointer hover:ring-4 hover:ring-sky-100 transition avatar-option" onclick="selectAvatar(this.src)">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSSzVLoM_6YTcaPTt4PeO0wzylH1a-ThqtGtDB00MmC9Q&s=10" class="w-14 h-14 rounded-full cursor-pointer hover:ring-4 hover:ring-sky-100 transition avatar-option" onclick="selectAvatar(this.src)">
                    <img src="https://cdn.hinatazaka46.com/files/14/diary/official/member/poka_key_NAGOYA.jpg" class="w-14 h-14 rounded-full cursor-pointer hover:ring-4 hover:ring-sky-100 transition avatar-option" onclick="selectAvatar(this.src)">
                </div>
                <button onclick="handleLogout()" class="w-full bg-slate-50 text-red-500 font-extrabold py-3.5 rounded-2xl hover:bg-red-50 transition border border-slate-100 active:scale-95">登出帳號</button>
            </div>
        </div>
    </div>

    <!-- 加入收藏夾彈窗 -->
    <div id="save-modal" class="fixed inset-0 bg-slate-950/20 backdrop-blur-sm z-[70] hidden flex items-center justify-center p-4 transition-opacity duration-300" onclick="if(event.target===this) closeSaveModal()">
        <div class="bg-white rounded-3xl max-w-sm w-full p-6 shadow-2xl relative border border-slate-100 animate-slide-up">
            <button onclick="closeSaveModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-900 text-2xl font-bold w-8 h-8 flex items-center justify-center">&times;</button>
            <h2 class="text-base sm:text-lg font-black mb-5 text-slate-900">加入收藏夾</h2>
            <div id="save-folder-list" class="space-y-2.5 max-h-[60vh] overflow-y-auto hide-scrollbar pb-4">
                <!-- 動態載入資料夾列表 -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4VrdmVLH2w0Xe6jcA5QREm99e7YxFDHA",
            authDomain: "hinata-collection.firebaseapp.com",
            databaseURL: "https://hinata-collection-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hinata-collection",
            storageBucket: "hinata-collection.firebasestorage.app",
            messagingSenderId: "800941835921",
            appId: "1:800941835921:web:9fbb420bf5baa7d9142130"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let allVideos = [];
        let allPlaylists = [];
        let allFolders = [];
        let currentUser = null;
        let activeTag = null;
        let subscribedTags = []; 
        let currentSaveVideoId = null; 
        let foldersRef = null; 
        let viewMode = 'grid'; // 'grid' 大圖檢視 | 'list' 清單檢視
        let lastGridData = {}; // 記住每個容器最後渲染的內容，供切換檢視時重繪
        const fallbackImage = "https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?auto=format&fit=crop&w=600&q=80";

        // 平台識別色設定
        function platformBadgeStyle(platform) {
            const key = (platform || '').toString().trim().toLowerCase();
            // key: [顯示文字, 額外 class, inline style]
            const map = {
                'x':         ['X',         'bg-black text-white border-white/10', ''],
                'twitter':   ['X',         'bg-black text-white border-white/10', ''],
                'threads':   ['Threads',   'bg-white text-black border-black/10', ''],
                'bilibili':  ['bilibili',  'text-white border-white/10', 'background-color:#FB7299;'],
                'b站':        ['bilibili',  'text-white border-white/10', 'background-color:#FB7299;'],
                'youtube':   ['YouTube',   'text-white border-white/10', 'background-color:#FF0000;'],
                'instagram': ['Instagram', 'text-white border-white/10', 'background:linear-gradient(45deg,#7024C4,#C21975,#F58529);'],
                'ig':        ['Instagram', 'text-white border-white/10', 'background:linear-gradient(45deg,#7024C4,#C21975,#F58529);'],
            };
            if (map[key]) return map[key];
            // 找不到對應平台時的預設樣式（沿用原本天空藍）
            return [platform || 'LINK', 'bg-sky-500/80 text-white border-white/10', ''];
        }

        // 卡片視覺微調
        function videoCardHtml(video) {
            let displayTitle = video.custom_title || video.original_title || video.original_excerpt || "未命名影片";
            const tagsArray = Array.isArray(video.tags) ? video.tags : [];
            const tagsHtml = tagsArray.map(tag => `<span class="text-[9px] font-semibold text-slate-300 bg-white/10 backdrop-blur-sm px-2 py-0.5 rounded-full">#${tag}</span>`).join('');
            const [platformLabel, platformClass, platformStyle] = platformBadgeStyle(video.platform);

            return `
                <div class="relative w-full aspect-[3/4] rounded-3xl overflow-hidden cursor-pointer group shadow-[0_4px_20px_rgb(14,165,233,0.02)] hover:shadow-xl transition-all duration-300 hover:-translate-y-1" onclick="openVideo('${video.id}')">
                    <img src="${video.thumbnail_url}" referrerpolicy="no-referrer" onerror="this.src='${fallbackImage}'" loading="lazy" class="absolute inset-0 w-full h-full object-cover transform group-hover:scale-105 transition-all duration-700 opacity-90">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-950/80 via-slate-900/20 to-transparent"></div>
                    
                    <div class="absolute top-3 left-3 backdrop-blur-md text-[9px] px-2.5 py-1 rounded-lg font-black border tracking-wide uppercase ${platformClass}" style="${platformStyle}">${platformLabel}</div>
                    
                    <button onclick="event.stopPropagation(); openSaveModal('${video.id}')" title="加入收藏"
                        class="absolute top-3 right-3 bg-slate-900/40 hover:bg-slate-900/80 backdrop-blur-md text-white w-8 h-8 rounded-full flex items-center justify-center transition border border-white/10 z-10 active:scale-90">
                        <span class="text-xs">📁</span>
                    </button>

                    <div class="absolute bottom-0 left-0 p-4 w-full text-white">
                        <h3 class="font-bold text-[13px] sm:text-[14px] leading-snug mb-1.5 drop-shadow-md line-clamp-2">${displayTitle}</h3>
                        ${video.description ? `<p class="text-[10px] sm:text-[11px] text-slate-300 line-clamp-1 mb-2 opacity-90">${video.description}</p>` : ''}
                        <div class="flex items-center gap-1.5 overflow-hidden whitespace-nowrap w-full text-ellipsis mt-1">${tagsHtml}</div>
                    </div>
                </div>
            `;
        }

        // 清單檢視卡片
        function videoListHtml(video) {
            let displayTitle = video.custom_title || video.original_title || video.original_excerpt || "未命名影片";
            const tagsArray = Array.isArray(video.tags) ? video.tags : [];
            const tagsHtml = tagsArray.map(tag => `<span class="text-[9px] font-semibold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full">#${tag}</span>`).join('');
            const [platformLabel, platformClass, platformStyle] = platformBadgeStyle(video.platform);

            return `
                <div class="flex gap-3 sm:gap-4 bg-white rounded-2xl border border-slate-100/80 shadow-sm hover:shadow-md transition-all duration-300 p-3 cursor-pointer group" onclick="openVideo('${video.id}')">
                    <div class="relative w-28 sm:w-40 flex-shrink-0 aspect-[4/3] rounded-xl overflow-hidden">
                        <img src="${video.thumbnail_url}" referrerpolicy="no-referrer" onerror="this.src='${fallbackImage}'" loading="lazy" class="absolute inset-0 w-full h-full object-cover transform group-hover:scale-105 transition-all duration-700">
                        <div class="absolute top-1.5 left-1.5 backdrop-blur-md text-[8px] px-2 py-0.5 rounded-md font-black border tracking-wide uppercase ${platformClass}" style="${platformStyle}">${platformLabel}</div>
                    </div>
                    <div class="flex-1 min-w-0 flex flex-col py-0.5">
                        <h3 class="font-bold text-[13px] sm:text-sm leading-snug text-slate-800 mb-1.5">${displayTitle}</h3>
                        ${video.description ? `<p class="text-[11px] sm:text-xs text-slate-400 leading-relaxed mb-2">${video.description}</p>` : ''}
                        <div class="mt-auto flex items-center gap-1.5 flex-wrap">${tagsHtml}</div>
                    </div>
                    <button onclick="event.stopPropagation(); openSaveModal('${video.id}')" title="加入收藏" class="self-start flex-shrink-0 bg-slate-50 hover:bg-slate-100 text-slate-400 hover:text-sky-500 w-8 h-8 rounded-full flex items-center justify-center transition active:scale-90">
                        <span class="text-xs">📁</span>
                    </button>
                </div>
            `;
        }

        window.openVideo = function(videoId) {
            const video = allVideos.find(v => v.id === videoId);
            if (!video) return;
            update(ref(db, 'videos/' + videoId), { view_count: (video.view_count || 0) + 1 });
            let targetUrl = video.url;
            if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) { targetUrl = 'https://' + targetUrl; }
            window.open(targetUrl, '_blank');
        };

        function renderGrid(containerId, list, emptyMessage) {
            lastGridData[containerId] = { list, emptyMessage };
            const container = document.getElementById(containerId);
            if(list.length > 0) {
                if (viewMode === 'list') {
                    container.classList.remove('masonry-grid');
                    container.innerHTML = `<div class="flex flex-col gap-3">${list.map(v => videoListHtml(v)).join('')}</div>`;
                } else {
                    container.classList.add('masonry-grid');
                    container.innerHTML = list.map(v => `<div class="masonry-item">${videoCardHtml(v)}</div>`).join('');
                }
            } else {
                container.classList.remove('masonry-grid'); 
                container.innerHTML = `<div class="py-12 text-center text-slate-400 text-sm w-full">${emptyMessage}</div>`;
            }
        }

        // 切換大圖／清單檢視，並讓所有已渲染過的影片牆（首頁、訂閱、收藏夾、分享頁）套用同一個設定
        window.toggleViewMode = function() {
            viewMode = viewMode === 'grid' ? 'list' : 'grid';
            document.querySelectorAll('.view-toggle-btn').forEach(btn => {
                btn.innerHTML = viewMode === 'grid' ? '☰ 清單檢視' : '⣿ 大圖檢視';
            });
            Object.keys(lastGridData).forEach(containerId => {
                const { list, emptyMessage } = lastGridData[containerId];
                renderGrid(containerId, list, emptyMessage);
            });
        };

        window.renderExplore = function() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            const sortMode = document.getElementById('sort-select').value;
            let list = allVideos.filter(v => !v.hidden);
            if (keyword) list = list.filter(v => (v.custom_title + v.original_title + v.tags?.join('')).toLowerCase().includes(keyword));
            list.sort((a, b) => sortMode === 'popular' ? (b.view_count || 0) - (a.view_count || 0) : b.created_at - a.created_at);
            renderGrid('explore-grid', list, '找不到影片。');
        };

        function renderSubs() {
            const tagSearchQuery = document.getElementById('tag-search-input').value.trim().toLowerCase();
            
            const tagsSet = new Set();
            allVideos.forEach(v => { if(!v.hidden && v.tags) v.tags.forEach(t => tagsSet.add(t)); });
            const allTagsArray = Array.from(tagsSet);

            const filteredTags = tagSearchQuery 
                ? allTagsArray.filter(t => t.toLowerCase().includes(tagSearchQuery))
                : allTagsArray;

            const activeTagsContainer = document.getElementById('subs-tags-active');
            if (subscribedTags.length === 0) {
                activeTagsContainer.innerHTML = `<span class="text-xs text-slate-400 py-1 block">目前尚未訂閱任何標籤</span>`;
            } else {
                activeTagsContainer.innerHTML = subscribedTags.map(tag => {
                    return `
                    <div class="inline-flex items-center border border-sky-200 bg-sky-50 rounded-xl shadow-sm overflow-hidden transition hover:border-sky-300">
                        <button onclick="filterSubs('${tag}')" class="px-3 py-1.5 text-xs font-black ${activeTag === tag ? 'bg-sky-500 text-white' : 'text-sky-600 hover:bg-sky-100/50'} transition">
                            #${tag}
                        </button>
                        <button onclick="toggleTagSub('${tag}')" class="px-2.5 py-1.5 text-xs bg-transparent border-l border-sky-100 hover:bg-red-50 transition" title="取消訂閱">
                            ⭐
                        </button>
                    </div>`;
                }).join('');
            }

            const allTagsContainer = document.getElementById('subs-tags-all');
            const remainingTags = filteredTags.filter(t => !subscribedTags.includes(t));

            if (remainingTags.length === 0) {
                allTagsContainer.innerHTML = `<span class="text-xs text-slate-400 py-2 block">沒有找到其他標籤</span>`;
            } else {
                allTagsContainer.innerHTML = remainingTags.map(tag => {
                    return `
                    <div class="inline-flex items-center border border-slate-200/60 bg-white rounded-xl shadow-sm overflow-hidden transition hover:border-slate-300">
                        <button onclick="filterSubs('${tag}')" class="px-3 py-1.5 text-xs font-bold ${activeTag === tag ? 'bg-slate-900 text-white' : 'text-slate-700 hover:bg-slate-50'} transition">
                            #${tag}
                        </button>
                        <button onclick="toggleTagSub('${tag}')" class="px-2.5 py-1.5 text-xs bg-transparent border-l border-slate-100 hover:bg-sky-50 transition" title="訂閱此標籤">
                            ☆
                        </button>
                    </div>`;
                }).join('');
            }

            let filteredVideos = [];
            let emptyMessage = '請點選上方標籤過濾影片';

            if (!activeTag) {
                if(subscribedTags.length > 0) {
                    filteredVideos = allVideos.filter(v => !v.hidden && v.tags && v.tags.some(t => subscribedTags.includes(t)));
                    emptyMessage = '您追蹤的標籤中目前沒有新影片';
                }
            } else {
                filteredVideos = allVideos.filter(v => !v.hidden && v.tags && v.tags.includes(activeTag));
                emptyMessage = `目前沒有 #${activeTag} 的影片`;
            }

            filteredVideos.sort((a, b) => b.created_at - a.created_at);
            renderGrid('subs-grid', filteredVideos, emptyMessage);
        }

        window.renderSubs = renderSubs;

        window.filterSubs = function(tag) { activeTag = tag; renderSubs(); };

        window.toggleTagSub = function(tag) {
            if(!currentUser) { alert('請先登入帳號才能訂閱 Tag！'); openAccountSettings(); return; }
            const nodeRef = ref(db, `users/${currentUser.uid}/subscribed_tags/${tag}`);
            if(subscribedTags.includes(tag)) set(nodeRef, null); 
            else set(nodeRef, true); 
        };

        function renderFoldersPage() {
            const container = document.getElementById('folders-container');
            if(!currentUser) return;
            if(allFolders.length === 0) {
                container.innerHTML = '<p class="text-slate-500 text-sm py-10 text-center col-span-full">尚未建立任何資料夾，快點擊頂部 📁 新增吧！</p>';
                return;
            }
            container.innerHTML = allFolders.map(f => {
                const count = f.video_ids ? Object.keys(f.video_ids).length : 0;
                return `
                <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 flex items-center justify-between cursor-pointer hover:shadow-md hover:border-slate-200 transition-all duration-200 active:scale-[0.98]" onclick="openFolderView('${f.id}')">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl border border-slate-100">${f.emoji || '📁'}</div>
                        <div>
                            <h2 class="text-base font-extrabold text-slate-900">${f.name}</h2>
                            <p class="text-xs text-slate-400 mt-1">已收錄 ${count} 部影片</p>
                        </div>
                    </div>
                    <div class="text-slate-300 pr-2">➔</div>
                </div>`;
            }).join('');
        }

        window.openFolderView = function(folderId) {
            const folder = allFolders.find(f => f.id === folderId);
            if(!folder) return;
            
            document.getElementById('folders-main-view').classList.add('hidden');
            document.getElementById('folder-view').classList.remove('hidden');
            document.getElementById('folder-view-title').innerText = `${folder.emoji || '📁'} ${folder.name}`;

            document.getElementById('btn-share-folder').onclick = () => shareFolder(folder);
            document.getElementById('btn-edit-folder').onclick = () => editFolder(folderId, folder.name, folder.emoji);
            document.getElementById('btn-delete-folder').onclick = () => deleteFolder(folderId, folder.name);

            const videoIds = folder.video_ids ? Object.keys(folder.video_ids) : [];
            let list = allVideos.filter(v => videoIds.includes(v.id));
            
            list.sort((a, b) => b.created_at - a.created_at);
            renderGrid('folder-videos-grid', list, '這個資料夾目前還沒有收藏影片喔！');
        };

        window.closeFolderView = function() {
            document.getElementById('folders-main-view').classList.remove('hidden');
            document.getElementById('folder-view').classList.add('hidden');
        };

        // [新增] 分享資料夾邏輯 (發佈到 shares/ 節點，實現未登入與無痕瀏覽)
        function shareFolder(folder) {
            const shareId = "s_" + Date.now();
            const shareData = {
                name: folder.name,
                emoji: folder.emoji || '📁',
                owner: currentUser.displayName || "日向坂推し",
                video_ids: folder.video_ids || {},
                created_at: Date.now()
            };

            set(ref(db, `shares/${shareId}`), shareData).then(() => {
                const shareUrl = `${window.location.origin}${window.location.pathname}?share=${shareId}`;
                
                // 複製到剪貼簿
                navigator.clipboard.writeText(shareUrl).then(() => {
                    showToast("🔗 分享連結已複製到剪貼簿！");
                }).catch(() => {
                    prompt("因瀏覽器權限限制，請手動複製以下網址分享給好友：", shareUrl);
                });
            }).catch(err => {
                console.error(err);
                alert("分享失敗，請稍後再試。");
            });
        }

        function editFolder(folderId, oldName, oldEmoji) {
            const newName = prompt('請輸入新的資料夾名稱：', oldName);
            if (!newName) return;
            const newEmoji = prompt('請輸入代表 Emoji (例如 📁)：', oldEmoji || '📁');
            if (newEmoji === null) return;
            
            update(ref(db, `users/${currentUser.uid}/folders/${folderId}`), {
                name: newName.trim(),
                emoji: newEmoji.trim() || '📁'
            }).then(() => {
                showToast("資料夾已更新");
                openFolderView(folderId); 
            });
        }

        function deleteFolder(folderId, folderName) {
            if (confirm(`確定要刪除整個資料夾「${folderName}」嗎？刪除後無法復原！`)) {
                set(ref(db, `users/${currentUser.uid}/folders/${folderId}`), null).then(() => {
                    showToast("資料夾已刪除");
                    closeFolderView();
                });
            }
        }

        onValue(ref(db, 'videos'), (snapshot) => {
            allVideos = snapshot.val() ? Object.values(snapshot.val()) : [];
            renderExplore(); renderRandom(true); renderSubs(); renderPlaylistsPage();
            if(!document.getElementById('playlist-view').classList.contains('hidden')) {
                openPlaylistView(document.getElementById('playlist-view').dataset.playlistId);
            }
            // 如果當前在分享檢視頁，也需要觸發一次更新
            checkSharedUrl();
        });

        // [新增] 精華區：讀取 Google 試算表 Playlists 分頁經由 GAS 寫入的 /playlists 節點
        // 預期資料格式：playlists/{playlistId} = { name, emoji, description, order, video_ids: [videoId, ...] }
        onValue(ref(db, 'playlists'), (snapshot) => {
            const data = snapshot.val() || {};
            allPlaylists = Object.keys(data).map(id => ({ id, ...data[id] }));
            allPlaylists.sort((a, b) => (a.order || 0) - (b.order || 0));
            renderPlaylistsPage();
        });

        function getPlaylistVideoIds(playlist) {
            if (!playlist.video_ids) return [];
            return Array.isArray(playlist.video_ids) ? playlist.video_ids.filter(Boolean) : Object.keys(playlist.video_ids);
        }

        function renderPlaylistsPage() {
            const container = document.getElementById('playlists-container');
            if (!container) return;
            if (allPlaylists.length === 0) {
                container.innerHTML = '<p class="text-slate-500 text-sm py-10 text-center col-span-full">目前尚無精華懶人包，敬請期待！</p>';
                return;
            }
            container.innerHTML = allPlaylists.map(p => {
                const count = getPlaylistVideoIds(p).length;
                return `
                <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 flex items-center justify-between cursor-pointer hover:shadow-md hover:border-slate-200 transition-all duration-200 active:scale-[0.98]" onclick="openPlaylistView('${p.id}')">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl border border-slate-100">${p.emoji || '✨'}</div>
                        <div>
                            <h2 class="text-base font-extrabold text-slate-900">${p.name}</h2>
                            <p class="text-xs text-slate-400 mt-1">${p.description ? p.description + '・' : ''}共 ${count} 部影片</p>
                        </div>
                    </div>
                    <div class="text-slate-300 pr-2">➔</div>
                </div>`;
            }).join('');
        }

        window.openPlaylistView = function(playlistId) {
            const playlist = allPlaylists.find(p => p.id === playlistId);
            if (!playlist) return;

            document.getElementById('playlists-main-view').classList.add('hidden');
            const playlistViewEl = document.getElementById('playlist-view');
            playlistViewEl.classList.remove('hidden');
            playlistViewEl.dataset.playlistId = playlistId;
            document.getElementById('playlist-view-title').innerText = `${playlist.emoji || '✨'} ${playlist.name}`;
            document.getElementById('playlist-view-desc').innerText = playlist.description || '';

            const ids = getPlaylistVideoIds(playlist);
            let list = allVideos.filter(v => ids.includes(v.id));
            list.sort((a, b) => ids.indexOf(a.id) - ids.indexOf(b.id));
            renderGrid('playlist-videos-grid', list, '這個懶人包目前還沒有收錄影片喔！');
        };

        window.closePlaylistView = function() {
            document.getElementById('playlists-main-view').classList.remove('hidden');
            document.getElementById('playlist-view').classList.add('hidden');
        };

        window.openFolderCreate = function() {
            if(!currentUser) { alert('請先登入帳號才能建立資料夾！'); openAccountSettings(); return; }
            const name = prompt('新分類名稱：');
            if(!name) return;
            const emoji = prompt('代表 emoji (留空預設📁)：') || '📁';
            push(ref(db, `users/${currentUser.uid}/folders`), { name: name.trim(), emoji: emoji, created_at: Date.now() });
        };

        window.openSaveModal = function(videoId) {
            if(!currentUser) { alert('請先登入帳號才能收藏影片！'); openAccountSettings(); return; }
            currentSaveVideoId = videoId;
            renderSaveModalList();
            document.getElementById('save-modal').classList.remove('hidden');
        };

        function renderSaveModalList() {
            const videoId = currentSaveVideoId;
            const list = document.getElementById('save-folder-list');

            const createRow = `
                <button onclick="showInlineFolderCreate()" class="w-full text-left px-4 py-4 rounded-2xl border border-dashed border-sky-200 bg-sky-50/50 hover:bg-sky-50 flex items-center gap-2 transition duration-200">
                    <span class="text-lg text-sky-500">＋</span>
                    <span class="font-bold text-sm text-sky-600">建立新資料夾</span>
                </button>`;

            if(allFolders.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-2">
                        <p class="text-sm text-slate-400 mb-4">你還沒有建立任何資料夾。</p>
                        ${createRow}
                    </div>`;
            } else {
                const folderRows = allFolders.map(f => {
                    const isSaved = f.video_ids && f.video_ids[videoId];
                    return `
                    <button onclick="toggleVideoInFolder('${f.id}', ${!!isSaved})" class="w-full text-left px-4 py-4 rounded-2xl border ${isSaved ? 'bg-sky-50 border-sky-200' : 'bg-white border-slate-100 hover:bg-slate-50'} flex justify-between items-center transition duration-200">
                        <span class="font-bold text-sm text-slate-800">${f.emoji || '📁'} ${f.name}</span>
                        <span class="text-lg">${isSaved ? '✅' : '<span class="text-gray-300">＋</span>'}</span>
                    </button>`;
                }).join('');
                list.innerHTML = createRow + folderRows;
            }
        }

        window.showInlineFolderCreate = function() {
            const list = document.getElementById('save-folder-list');
            list.innerHTML = `
                <div class="px-1 py-2">
                    <p class="text-xs font-bold text-slate-500 mb-3">建立新資料夾</p>
                    <div class="flex gap-2 mb-3">
                        <input id="inline-folder-emoji" type="text" maxlength="2" placeholder="📁" class="w-14 text-center bg-slate-50 border border-slate-100 rounded-xl py-3 text-lg focus:outline-none focus:ring-2 focus:ring-sky-200">
                        <input id="inline-folder-name" type="text" placeholder="資料夾名稱" class="flex-1 bg-slate-50 border border-slate-100 rounded-xl py-3 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-sky-200">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="renderSaveModalList()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition">取消</button>
                        <button onclick="confirmInlineFolderCreate()" class="flex-1 bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 rounded-xl transition">建立並加入</button>
                    </div>
                </div>`;
            document.getElementById('inline-folder-name').focus();
        };

        window.confirmInlineFolderCreate = async function() {
            const nameInput = document.getElementById('inline-folder-name');
            const emojiInput = document.getElementById('inline-folder-emoji');
            const name = nameInput.value.trim();
            if(!name) { nameInput.focus(); return; }
            const emoji = emojiInput.value.trim() || '📁';

            const newFolderRef = push(ref(db, `users/${currentUser.uid}/folders`));
            await set(newFolderRef, { name: name, emoji: emoji, created_at: Date.now() });
            // 新資料夾建立後，直接把當前影片加進去
            await set(ref(db, `users/${currentUser.uid}/folders/${newFolderRef.key}/video_ids/${currentSaveVideoId}`), true);
            closeSaveModal();
            showToast(`已建立「${emoji} ${name}」並加入影片`);
        };

        window.closeSaveModal = function() { document.getElementById('save-modal').classList.add('hidden'); };

        window.toggleVideoInFolder = function(folderId, isCurrentlySaved) {
            const nodeRef = ref(db, `users/${currentUser.uid}/folders/${folderId}/video_ids/${currentSaveVideoId}`);
            if(isCurrentlySaved) set(nodeRef, null); 
            else set(nodeRef, true); 
            closeSaveModal();
            showToast(isCurrentlySaved ? "已從資料夾移除" : "已加入資料夾");
        };

        function showToast(text) {
            const msg = document.createElement('div');
            msg.className = "fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur-md text-white px-6 py-2.5 rounded-full text-xs font-black z-[100] shadow-lg border border-white/10 animate-fade-in";
            msg.innerText = text;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2200);
        }

        let randomPool = [];
        window.shuffleRandom = function() { renderRandom(true); };
        function renderRandom(reshuffle) {
            const track = document.getElementById('random-track'), dots = document.getElementById('random-dots');
            if(!allVideos.length) return;
            if(reshuffle || !randomPool.length) randomPool = allVideos.filter(v => !v.hidden).sort(() => .5 - Math.random()).slice(0, 6);
            
            track.innerHTML = randomPool.map(v => `<div class="carousel-slide flex-shrink-0 w-44"><div class="aspect-[3/4]">${videoCardHtml(v)}</div></div>`).join('');
            dots.innerHTML = randomPool.map((_, i) => `<span class="dot w-1.5 h-1.5 rounded-full bg-slate-300 ${i===0?'active':''}"></span>`).join('');
            
            track.onscroll = () => {
                const firstChild = track.firstElementChild;
                if(!firstChild) return;
                const childWidth = firstChild.offsetWidth + 20; 
                const idx = childWidth > 20 ? Math.round(track.scrollLeft / childWidth) : 0;
                [...dots.children].forEach((d, i) => d.classList.toggle('active', i === idx));
            };
        }

        window.openAccountSettings = function() { document.getElementById('account-modal').classList.remove('hidden'); };
        window.closeAccountModal = function() { document.getElementById('account-modal').classList.add('hidden'); };
        
        window.handleLogin = async function() {
            try { await signInWithPopup(auth, new GoogleAuthProvider()); } 
            catch(err) { console.error(err); alert("登入失敗，請確認 Firebase 已啟用 Google 登入。"); }
        };

        window.handleLogout = async function() {
            if(confirm('確定要登出嗎？')) { await signOut(auth); closeAccountModal(); }
        };

        window.selectAvatar = function(url) {
            if(!currentUser) return;
            set(ref(db, 'users/' + currentUser.uid + '/avatarUrl'), url);
            updateAvatarDisplay(url);
            closeAccountModal();
        };

        function updateAvatarDisplay(url) {
            document.getElementById('account-initial').classList.add('hidden');
            const img = document.getElementById('account-img');
            img.src = url; img.classList.remove('hidden');
        }

        // [新增] 檢查並處理網址中是否有分享資料夾的 ID 路由
        function checkSharedUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const shareId = urlParams.get('share');
            if (!shareId) return;

            // 隱藏頂部的分類滾動列與其他所有視頁，保留分享檢視
            document.getElementById('category-section').classList.add('hidden');
            document.querySelectorAll('.layer-section').forEach(el => el.classList.add('hidden'));
            const sharedLayer = document.getElementById('layer-shared');
            sharedLayer.classList.remove('hidden');

            document.getElementById('shared-folder-title').innerText = "🔮 正在載入分享資料夾...";
            document.getElementById('shared-folder-desc').innerText = "";

            onValue(ref(db, `shares/${shareId}`), (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    document.getElementById('shared-folder-title').innerText = "⚠️ 找不到分享資料夾";
                    document.getElementById('shared-folder-desc').innerText = "該資料夾可能已被原作者刪除，或網址有誤。";
                    renderGrid('shared-videos-grid', [], '查無影片內容');
                    return;
                }

                document.getElementById('shared-folder-title').innerText = `${data.emoji || '📁'} ${data.name}`;
                document.getElementById('shared-folder-desc').innerText = ``;

                const videoIds = data.video_ids ? Object.keys(data.video_ids) : [];
                const list = allVideos.filter(v => videoIds.includes(v.id));
                list.sort((a, b) => b.created_at - a.created_at);

                renderGrid('shared-videos-grid', list, '這個分享資料夾目前沒有影片喔！');
            }, { onlyOnce: true });
        }

        // [新增] 離開分享檢視，乾淨返回首頁並重設 URL 參數
        window.exitSharedView = function() {
            // 清理網址參數不重整頁面
            window.history.pushState({}, document.title, window.location.pathname);
            
            document.getElementById('category-section').classList.remove('hidden');
            document.getElementById('layer-shared').classList.add('hidden');
            switchLayer('explore');
        };

        onAuthStateChanged(auth, (user) => {
            if (foldersRef) {
                off(foldersRef); 
                foldersRef = null;
            }

            currentUser = user;
            const folderPrompt = document.getElementById('folder-login-prompt');
            const folderMainView = document.getElementById('folders-main-view');

            if(user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('profile-section').classList.remove('hidden');
                
                if (folderPrompt) folderPrompt.classList.add('hidden');
                if (folderMainView) folderMainView.classList.remove('hidden');

                foldersRef = ref(db, `users/${user.uid}/folders`);
                onValue(foldersRef, (snapshot) => {
                    allFolders = snapshot.val() ? Object.entries(snapshot.val()).map(([id, f]) => ({ id, ...f })) : [];
                    
                    document.getElementById('category-scroll').innerHTML = allFolders.map(f => `
                        <div class="flex flex-col items-center gap-1.5 flex-shrink-0 cursor-pointer group" onclick="switchLayer('folders'); openFolderView('${f.id}')">
                            <div class="relative w-15 h-15 rounded-2xl bg-white border border-slate-100 shadow-sm flex items-center justify-center text-2xl transform group-hover:scale-105 group-hover:border-slate-200 transition-all duration-300">
                                ${f.emoji || '📁'}
                            </div>
                            <span class="text-xs font-bold text-slate-600 max-w-[64px] truncate group-hover:text-sky-500 transition">${f.name}</span>
                        </div>
                    `).join('') + `
                        <div class="flex flex-col items-center gap-1.5 flex-shrink-0 cursor-pointer group" onclick="openFolderCreate()">
                            <div class="w-15 h-15 rounded-2xl border-2 border-dashed border-slate-300 flex items-center justify-center text-xl text-slate-400 group-hover:border-sky-400 group-hover:text-sky-500 transition-all duration-300">＋</div>
                            <span class="text-xs font-bold text-slate-400 group-hover:text-slate-500 transition">新分類</span>
                        </div>
                    `;
                    renderFoldersPage();
                    
                    if(!document.getElementById('folder-view').classList.contains('hidden')) {
                        const currentTitle = document.getElementById('folder-view-title').innerText;
                        const folderName = currentTitle.substring(currentTitle.indexOf(' ') + 1); 
                        const f = allFolders.find(x => x.name === folderName);
                        if(f) openFolderView(f.id);
                    }
                });

                onValue(ref(db, 'users/' + user.uid + '/avatarUrl'), (snap) => {
                    updateAvatarDisplay(snap.val() || user.photoURL);
                }, { onlyOnce: true });

                onValue(ref(db, 'users/' + user.uid + '/subscribed_tags'), (snap) => {
                    subscribedTags = snap.val() ? Object.keys(snap.val()) : [];
                    renderSubs();
                });
            } else {
                subscribedTags = [];
                allFolders = [];
                
                document.getElementById('category-scroll').innerHTML = `
                    <div class="flex flex-col items-center gap-1.5 flex-shrink-0 cursor-pointer group" onclick="openFolderCreate()">
                        <div class="w-15 h-15 rounded-2xl border-2 border-dashed border-slate-300 flex items-center justify-center text-xl text-slate-400 group-hover:border-sky-400 group-hover:text-sky-500 transition-all duration-300">＋</div>
                        <span class="text-xs font-bold text-slate-400 group-hover:text-slate-500 transition">建立資料夾</span>
                    </div>
                `;

                if (folderPrompt) folderPrompt.classList.remove('hidden');
                if (folderMainView) folderMainView.classList.add('hidden');

                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('profile-section').classList.add('hidden');
                document.getElementById('account-initial').classList.remove('hidden');
                document.getElementById('account-img').classList.add('hidden');
                renderSubs();
            }

            // 初始化時檢查是否有公開分享連結路由
            checkSharedUrl();
        });

        window.switchLayer = function(layer) {
            document.querySelectorAll('.layer-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(`layer-${layer}`).classList.remove('hidden');
            ['explore', 'subs', 'playlists', 'folders'].forEach(t => {
                document.getElementById(`tab-${t}`).className = t === layer 
                    ? "px-5 py-2 text-xs font-black rounded-xl bg-white shadow-sm text-slate-900 transition-all duration-300" 
                    : "px-5 py-2 text-xs font-black rounded-xl text-slate-500 hover:text-slate-900 transition-all duration-300";
            });
            if(layer === 'folders') closeFolderView();
            if(layer === 'playlists') closePlaylistView();
        };
    </script>
</body>
</html>
