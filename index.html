<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留友看 Hinata Ver.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .masonry-grid { column-count: 2; column-gap: 1rem; }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }
        .masonry-item { break-inside: avoid; margin-bottom: 1rem; }
        .carousel-track { scroll-snap-type: x mandatory; }
        .carousel-slide { scroll-snap-align: center; }
        .dot { transition: all .25s ease; }
        .dot.active { width: 18px; border-radius: 9999px; background-color: #3B82F6; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased pb-20">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-5 py-4 flex justify-between items-center gap-4">
            <h1 class="text-xl font-extrabold tracking-widest text-gray-900 whitespace-nowrap">
                <span class="text-blue-500">留友看</span> Hinata Ver.
            </h1>
            <div class="flex items-center gap-2">
                <button onclick="openFolderCreate()" title="新增收藏分類" class="w-9 h-9 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-lg transition">📁</button>
                <button id="account-btn" onclick="openAccountSettings()" title="登入 / 我的帳號" class="w-9 h-9 rounded-full bg-gray-900 text-white flex items-center justify-center text-sm font-bold transition overflow-hidden shadow-sm">
                    <span id="account-initial">?</span>
                    <img id="account-img" class="w-full h-full object-cover hidden" src="" alt="avatar">
                </button>
            </div>
        </div>

        <nav class="max-w-7xl mx-auto px-5 pb-3 flex bg-gray-100 mx-5 rounded-xl w-fit">
            <button onclick="switchLayer('explore')" id="tab-explore" class="px-4 py-2 text-sm font-bold rounded-lg bg-white shadow-sm text-gray-900 transition">🌍 全站探索</button>
            <button onclick="switchLayer('subs')" id="tab-subs" class="px-4 py-2 text-sm font-bold rounded-lg text-gray-500 hover:text-gray-900 transition relative">🔔 專屬訂閱</button>
            <button onclick="switchLayer('folders')" id="tab-folders" class="px-4 py-2 text-sm font-bold rounded-lg text-gray-500 hover:text-gray-900 transition">📁 個人收藏夾</button>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-5 pt-6">
        <section class="mb-6">
            <div id="category-scroll" class="flex gap-4 overflow-x-auto hide-scrollbar pb-2"></div>
        </section>

        <!-- 第一層：全站探索 -->
        <section id="layer-explore" class="layer-section">
            <div class="mb-8">
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
                    <input id="search-input" type="text" placeholder="搜尋全部影片..." class="w-full bg-white border border-gray-200 rounded-2xl py-3 pl-11 pr-4 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400" oninput="renderExplore()">
                </div>
            </div>

            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-extrabold text-gray-800 tracking-wider">🎲 隨機回味</h2>
                <button onclick="shuffleRandom()" class="bg-blue-500 hover:bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-full shadow-sm transition">換一批</button>
            </div>
            <div id="random-track" class="carousel-track flex overflow-x-auto hide-scrollbar gap-4 pb-2 mb-2"></div>
            <div id="random-dots" class="flex justify-center gap-1.5 mb-10"></div>

            <div class="mb-4 flex justify-between items-center border-t border-gray-200 pt-8">
                <h2 class="text-lg font-extrabold text-gray-800 tracking-wider">最新上架影片</h2>
                <select id="sort-select" onchange="renderExplore()" class="text-sm font-bold bg-white border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none">
                    <option value="newest">最新上架</option>
                    <option value="popular">最熱門</option>
                </select>
            </div>
            <div id="explore-grid" class="masonry-grid"><p class="text-gray-500 text-sm py-10 text-center col-span-full block w-full">正在同步最新資料...</p></div>
        </section>

        <!-- 第二層：專屬訂閱 -->
        <section id="layer-subs" class="layer-section hidden">
            <div class="mb-6">
                <h2 class="text-lg font-extrabold text-gray-800 tracking-wider mb-2">Tag 訂閱動態</h2>
                <p class="text-xs text-gray-500 mb-3 whitespace-nowrap">點擊文字檢視動態，點擊星星 ⭐ 即可訂閱</p>
                <div id="subs-tags" class="flex gap-3 flex-wrap"></div>
            </div>
            <div class="border-t border-gray-100 mb-6"></div>
            <div id="subs-grid" class="masonry-grid"><p class="text-gray-500 text-sm py-10 text-center col-span-full block w-full">請先點選上方的 Tag 進行檢視</p></div>
        </section>

        <!-- 第三層：個人收藏夾 -->
        <section id="layer-folders" class="layer-section hidden">
            <!-- 資料夾列表視圖 -->
            <div id="folders-main-view">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-extrabold text-gray-800 tracking-wider">我的收藏夾</h2>
                </div>
                <div id="folders-container" class="space-y-4">
                    <p class="text-gray-500 text-sm py-10 text-center">目前還沒有建立任何資料夾。</p>
                </div>
            </div>
            
            <!-- 單一資料夾內容視圖 -->
            <div id="folder-view" class="hidden">
                <button onclick="closeFolderView()" class="mb-5 flex items-center gap-2 text-sm font-bold text-gray-500 hover:text-gray-900 transition bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-100">
                    <span>⬅</span> 返回列表
                </button>
                <h2 id="folder-view-title" class="text-xl font-extrabold text-gray-800 tracking-wider mb-6"></h2>
                <div id="folder-videos-grid" class="masonry-grid"></div>
            </div>
        </section>
    </main>

    <!-- 頭像選擇彈窗 -->
    <div id="account-modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center p-4" onclick="if(event.target===this) closeAccountModal()">
        <div class="bg-white rounded-3xl max-w-sm w-full p-6 shadow-xl relative">
            <button onclick="closeAccountModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-900 text-xl font-bold">&times;</button>
            <h2 class="text-lg font-extrabold mb-4 text-gray-900">帳號設定</h2>
            
            <div id="login-section" class="hidden">
                <p class="text-sm text-gray-600 mb-6 leading-relaxed">登入後即可建立你的專屬收藏夾、訂閱標籤，並在不同裝置間同步。</p>
                <button onclick="handleLogin()" class="w-full bg-blue-500 text-white font-bold py-3.5 rounded-xl hover:bg-blue-600 transition shadow-sm">使用 Google 帳號登入</button>
            </div>

            <div id="profile-section" class="hidden">
                <p class="text-sm font-bold text-gray-800 mb-3">選擇預設頭像</p>
                <div class="grid grid-cols-4 gap-3 mb-8" id="avatar-choices">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Shiho" class="w-14 h-14 rounded-full cursor-pointer hover:ring-4 hover:ring-blue-100 transition avatar-option" onclick="selectAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Kumi" class="w-14 h-14 rounded-full cursor-pointer hover:ring-4 hover:ring-blue-100 transition avatar-option" onclick="selectAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Miku" class="w-14 h-14 rounded-full cursor-pointer hover:ring-4 hover:ring-blue-100 transition avatar-option" onclick="selectAvatar(this.src)">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Hinata" class="w-14 h-14 rounded-full cursor-pointer hover:ring-4 hover:ring-blue-100 transition avatar-option" onclick="selectAvatar(this.src)">
                </div>
                <button onclick="handleLogout()" class="w-full bg-gray-50 text-red-500 font-bold py-3 rounded-xl hover:bg-red-50 transition border border-gray-100">登出帳號</button>
            </div>
        </div>
    </div>

    <!-- 加入收藏夾彈窗 -->
    <div id="save-modal" class="fixed inset-0 bg-black/60 z-[70] hidden flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity" onclick="if(event.target===this) closeSaveModal()">
        <div class="bg-white rounded-t-3xl sm:rounded-3xl max-w-sm w-full p-6 shadow-2xl relative animate-slide-up sm:animate-none">
            <button onclick="closeSaveModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-900 text-2xl font-bold w-8 h-8 flex items-center justify-center">&times;</button>
            <h2 class="text-xl font-extrabold mb-5 text-gray-900">加入收藏夾</h2>
            <div id="save-folder-list" class="space-y-2 max-h-[60vh] overflow-y-auto hide-scrollbar pb-4">
                <!-- 動態載入資料夾列表 -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4VrdmVLH2w0Xe6jcA5QREm99e7YxFDHA",
            authDomain: "hinata-collection.firebaseapp.com",
            databaseURL: "https://hinata-collection-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hinata-collection",
            storageBucket: "hinata-collection.firebasestorage.app",
            messagingSenderId: "800941835921",
            appId: "1:800941835921:web:9fbb420bf5baa7d9142130"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let allVideos = [];
        let allFolders = [];
        let currentUser = null;
        let activeTag = null;
        let subscribedTags = []; 
        let currentSaveVideoId = null; 
        const fallbackImage = "https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?auto=format&fit=crop&w=600&q=80";

        function videoCardHtml(video) {
            let displayTitle = video.custom_title || video.original_title || video.original_excerpt || "未命名影片";
            const tagsArray = Array.isArray(video.tags) ? video.tags : [];
            const tagsHtml = tagsArray.map(tag => `<span class="text-[11px] font-medium text-gray-300">#${tag}</span>`).join('');

            return `
                <div class="relative w-full aspect-[3/4] rounded-2xl overflow-hidden cursor-pointer group shadow-sm bg-gray-900" onclick="openVideo('${video.id}')">
                    <img src="${video.thumbnail_url}" referrerpolicy="no-referrer" onerror="this.src='${fallbackImage}'" class="absolute inset-0 w-full h-full object-cover transform group-hover:scale-105 transition duration-700 opacity-80">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent"></div>
                    
                    <div class="absolute top-3 left-3 bg-white/20 backdrop-blur-md text-white text-[10px] px-2 py-1 rounded-md font-bold border border-white/20 uppercase">${video.platform || 'LINK'}</div>
                    
                    <button onclick="event.stopPropagation(); openSaveModal('${video.id}')" title="加入收藏"
                        class="absolute top-3 right-3 bg-black/40 hover:bg-black/70 backdrop-blur-md text-white w-8 h-8 rounded-full flex items-center justify-center transition border border-white/20 z-10">
                        <span class="text-sm">📁</span>
                    </button>

                    <div class="absolute bottom-0 left-0 p-4 w-full text-white">
                        <h3 class="font-bold text-[15px] leading-snug mb-1 drop-shadow-md line-clamp-2">${displayTitle}</h3>
                        ${video.description ? `<p class="text-[11px] text-gray-300 line-clamp-1 mb-1">${video.description}</p>` : ''}
                        <div class="flex items-center gap-1.5 overflow-hidden whitespace-nowrap w-full text-ellipsis mt-1">${tagsHtml}</div>
                    </div>
                </div>
            `;
        }

        window.openVideo = function(videoId) {
            const video = allVideos.find(v => v.id === videoId);
            if (!video) return;
            update(ref(db, 'videos/' + videoId), { view_count: (video.view_count || 0) + 1 });
            let targetUrl = video.url;
            if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) { targetUrl = 'https://' + targetUrl; }
            window.open(targetUrl, '_blank');
        };

        // 幫元素加上或移除 masonry-grid 避免斷字
        function renderGrid(containerId, list, emptyMessage) {
            const container = document.getElementById(containerId);
            if(list.length > 0) {
                container.classList.add('masonry-grid');
                container.innerHTML = list.map(v => `<div class="masonry-item">${videoCardHtml(v)}</div>`).join('');
            } else {
                container.classList.remove('masonry-grid'); // 移除瀑布流排版
                container.innerHTML = `<div class="py-10 text-center text-gray-500 text-sm w-full">${emptyMessage}</div>`;
            }
        }

        window.renderExplore = function() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            const sortMode = document.getElementById('sort-select').value;
            let list = allVideos.filter(v => !v.hidden);
            if (keyword) list = list.filter(v => (v.custom_title + v.original_title + v.tags?.join('')).toLowerCase().includes(keyword));
            list.sort((a, b) => sortMode === 'popular' ? (b.view_count || 0) - (a.view_count || 0) : b.created_at - a.created_at);
            renderGrid('explore-grid', list, '找不到影片。');
        };

        function renderSubs() {
            const tagsSet = new Set();
            allVideos.forEach(v => { if(!v.hidden && v.tags) v.tags.forEach(t => tagsSet.add(t)); });
            
            const tagsContainer = document.getElementById('subs-tags');
            tagsContainer.innerHTML = Array.from(tagsSet).map(tag => {
                const isSubbed = subscribedTags.includes(tag);
                return `
                <div class="inline-flex items-center border ${isSubbed ? 'border-blue-300' : 'border-gray-200'} rounded-full shadow-sm overflow-hidden transition">
                    <button onclick="filterSubs('${tag}')" class="px-3 py-1.5 text-xs font-bold ${activeTag === tag ? 'bg-blue-500 text-white' : 'bg-white text-gray-700 hover:bg-gray-50'} transition">
                        #${tag}
                    </button>
                    <button onclick="toggleTagSub('${tag}')" class="px-2.5 py-1.5 text-xs bg-white border-l border-gray-100 hover:bg-yellow-50 transition" title="訂閱此標籤">
                        ${isSubbed ? '⭐' : '☆'}
                    </button>
                </div>`;
            }).join('');

            let filtered = [];
            let emptyMessage = '請點選上方的 Tag 檢視，或點擊星星訂閱';

            if (!activeTag) {
                if(subscribedTags.length > 0) {
                    filtered = allVideos.filter(v => !v.hidden && v.tags && v.tags.some(t => subscribedTags.includes(t)));
                    emptyMessage = '你訂閱的標籤目前沒有影片';
                }
            } else {
                filtered = allVideos.filter(v => !v.hidden && v.tags && v.tags.includes(activeTag));
                emptyMessage = `目前沒有 #${activeTag} 的影片`;
            }

            // 強制時間排序（最新在最前）
            filtered.sort((a, b) => b.created_at - a.created_at);
            renderGrid('subs-grid', filtered, emptyMessage);
        }

        window.filterSubs = function(tag) { activeTag = tag; renderSubs(); };

        window.toggleTagSub = function(tag) {
            if(!currentUser) { alert('請先登入帳號才能訂閱 Tag！'); openAccountSettings(); return; }
            const nodeRef = ref(db, `users/${currentUser.uid}/subscribed_tags/${tag}`);
            if(subscribedTags.includes(tag)) set(nodeRef, null); 
            else set(nodeRef, true); 
        };

        function renderFoldersPage() {
            const container = document.getElementById('folders-container');
            if(allFolders.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm py-10 text-center">尚未建立任何資料夾，快點擊頂部 📁 新增吧！</p>';
                return;
            }
            container.innerHTML = allFolders.map(f => {
                const count = f.video_ids ? Object.keys(f.video_ids).length : 0;
                return `
                <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 flex items-center justify-between cursor-pointer hover:shadow-md transition" onclick="openFolderView('${f.id}')">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center text-2xl border border-blue-100">${f.emoji || '📁'}</div>
                        <div>
                            <h2 class="text-lg font-extrabold text-gray-900">${f.name}</h2>
                            <p class="text-xs text-gray-500 mt-1">已收錄 ${count} 部影片</p>
                        </div>
                    </div>
                    <div class="text-gray-300 pr-2">➔</div>
                </div>`;
            }).join('');
        }

        // --- 新增：展開檢視個人收藏夾內容 ---
        window.openFolderView = function(folderId) {
            const folder = allFolders.find(f => f.id === folderId);
            if(!folder) return;
            
            document.getElementById('folders-main-view').classList.add('hidden');
            document.getElementById('folder-view').classList.remove('hidden');
            document.getElementById('folder-view-title').innerText = `${folder.emoji || '📁'} ${folder.name}`;

            const videoIds = folder.video_ids ? Object.keys(folder.video_ids) : [];
            let list = allVideos.filter(v => videoIds.includes(v.id));
            
            // 強制時間排序（最新在最前）
            list.sort((a, b) => b.created_at - a.created_at);
            renderGrid('folder-videos-grid', list, '這個資料夾目前還沒有收藏影片喔！');
        };

        window.closeFolderView = function() {
            document.getElementById('folders-main-view').classList.remove('hidden');
            document.getElementById('folder-view').classList.add('hidden');
        };

        onValue(ref(db, 'videos'), (snapshot) => {
            allVideos = snapshot.val() ? Object.values(snapshot.val()) : [];
            renderExplore(); renderRandom(true); renderSubs();
        });

        onValue(ref(db, 'folders'), (snapshot) => {
            allFolders = snapshot.val() ? Object.entries(snapshot.val()).map(([id, f]) => ({ id, ...f })) : [];
            document.getElementById('category-scroll').innerHTML = allFolders.map(f => `
                <div class="flex flex-col items-center gap-1 flex-shrink-0 cursor-pointer" onclick="switchLayer('folders')">
                    <div class="relative w-14 h-14 rounded-full bg-blue-50 border border-blue-100 flex items-center justify-center text-2xl">${f.emoji || '📁'}</div>
                    <span class="text-xs font-bold text-gray-700 max-w-[64px] truncate">${f.name}</span>
                </div>
            `).join('') + `
                <div class="flex flex-col items-center gap-1 flex-shrink-0 cursor-pointer" onclick="openFolderCreate()">
                    <div class="w-14 h-14 rounded-full border-2 border-dashed border-gray-300 flex items-center justify-center text-xl text-gray-400">＋</div>
                    <span class="text-xs font-bold text-gray-400">新分類</span>
                </div>
            `;
            renderFoldersPage();
            // 如果當前正在瀏覽某個資料夾，也同步更新裡面的畫面
            if(!document.getElementById('folder-view').classList.contains('hidden')) {
                const currentTitle = document.getElementById('folder-view-title').innerText;
                const folderName = currentTitle.substring(currentTitle.indexOf(' ') + 1); // 簡略比對
                const f = allFolders.find(x => x.name === folderName);
                if(f) openFolderView(f.id);
            }
        });

        window.openFolderCreate = function() {
            const name = prompt('新分類名稱：');
            if(!name) return;
            push(ref(db, 'folders'), { name: name.trim(), emoji: prompt('代表 emoji (留空預設📁)：') || '📁', created_at: Date.now() });
        };

        window.openSaveModal = function(videoId) {
            if(!currentUser) { alert('請先登入帳號才能收藏影片！'); openAccountSettings(); return; }
            currentSaveVideoId = videoId;
            const list = document.getElementById('save-folder-list');
            
            if(allFolders.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-6">
                        <p class="text-sm text-gray-500 mb-4">你還沒有建立任何資料夾。</p>
                        <button onclick="closeSaveModal(); openFolderCreate()" class="bg-blue-50 text-blue-600 font-bold px-6 py-2 rounded-xl border border-blue-100">建立新資料夾</button>
                    </div>`;
            } else {
                list.innerHTML = allFolders.map(f => {
                    const isSaved = f.video_ids && f.video_ids[videoId];
                    return `
                    <button onclick="toggleVideoInFolder('${f.id}', ${!!isSaved})" class="w-full text-left px-4 py-3.5 rounded-2xl border ${isSaved ? 'bg-blue-50 border-blue-200' : 'bg-white border-gray-100 hover:bg-gray-50'} flex justify-between items-center transition">
                        <span class="font-bold text-sm text-gray-800">${f.emoji || '📁'} ${f.name}</span>
                        <span class="text-lg">${isSaved ? '✅' : '<span class="text-gray-300">＋</span>'}</span>
                    </button>`;
                }).join('');
            }
            document.getElementById('save-modal').classList.remove('hidden');
        };

        window.closeSaveModal = function() { document.getElementById('save-modal').classList.add('hidden'); };

        window.toggleVideoInFolder = function(folderId, isCurrentlySaved) {
            const nodeRef = ref(db, `folders/${folderId}/video_ids/${currentSaveVideoId}`);
            if(isCurrentlySaved) set(nodeRef, null); 
            else set(nodeRef, true); 
            closeSaveModal();
            const msg = document.createElement('div');
            msg.className = "fixed bottom-5 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-2 rounded-full text-sm font-bold z-[100] shadow-lg animate-fade-in";
            msg.innerText = isCurrentlySaved ? "已從資料夾移除" : "已加入資料夾";
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        };

        let randomPool = [];
        window.shuffleRandom = function() { renderRandom(true); };
        function renderRandom(reshuffle) {
            const track = document.getElementById('random-track'), dots = document.getElementById('random-dots');
            if(!allVideos.length) return;
            if(reshuffle || !randomPool.length) randomPool = allVideos.filter(v => !v.hidden).sort(() => .5 - Math.random()).slice(0, 6);
            
            track.innerHTML = randomPool.map(v => `<div class="carousel-slide flex-shrink-0 w-40"><div class="aspect-[3/4]">${videoCardHtml(v)}</div></div>`).join('');
            dots.innerHTML = randomPool.map((_, i) => `<span class="dot w-1.5 h-1.5 rounded-full bg-gray-300 ${i===0?'active':''}"></span>`).join('');
            
            track.onscroll = () => {
                const idx = Math.round(track.scrollLeft / (track.firstElementChild.offsetWidth + 16));
                [...dots.children].forEach((d, i) => d.classList.toggle('active', i === idx));
            };
        }

        window.openAccountSettings = function() { document.getElementById('account-modal').classList.remove('hidden'); };
        window.closeAccountModal = function() { document.getElementById('account-modal').classList.add('hidden'); };
        
        window.handleLogin = async function() {
            try { await signInWithPopup(auth, new GoogleAuthProvider()); } 
            catch(err) { console.error(err); alert("登入失敗，請確認 Firebase 已啟用 Google 登入。"); }
        };

        window.handleLogout = async function() {
            if(confirm('確定要登出嗎？')) { await signOut(auth); closeAccountModal(); }
        };

        window.selectAvatar = function(url) {
            if(!currentUser) return;
            set(ref(db, 'users/' + currentUser.uid + '/avatarUrl'), url);
            updateAvatarDisplay(url);
            closeAccountModal();
        };

        function updateAvatarDisplay(url) {
            document.getElementById('account-initial').classList.add('hidden');
            const img = document.getElementById('account-img');
            img.src = url; img.classList.remove('hidden');
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if(user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('profile-section').classList.remove('hidden');
                
                onValue(ref(db, 'users/' + user.uid + '/avatarUrl'), (snap) => {
                    updateAvatarDisplay(snap.val() || user.photoURL);
                }, { onlyOnce: true });

                onValue(ref(db, 'users/' + user.uid + '/subscribed_tags'), (snap) => {
                    subscribedTags = snap.val() ? Object.keys(snap.val()) : [];
                    renderSubs();
                });
            } else {
                subscribedTags = [];
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('profile-section').classList.add('hidden');
                document.getElementById('account-initial').classList.remove('hidden');
                document.getElementById('account-img').classList.add('hidden');
                renderSubs();
            }
        });

        window.switchLayer = function(layer) {
            document.querySelectorAll('.layer-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(`layer-${layer}`).classList.remove('hidden');
            ['explore', 'subs', 'folders'].forEach(t => {
                document.getElementById(`tab-${t}`).className = t === layer ? "px-4 py-2 text-sm font-bold rounded-lg bg-white shadow-sm text-gray-900 transition relative" : "px-4 py-2 text-sm font-bold rounded-lg text-gray-500 hover:text-gray-900 transition relative";
            });
            // 切換分頁時，如果原本在看資料夾內容，將其重置回資料夾列表
            if(layer === 'folders') closeFolderView();
        };
    </script>
</body>
</html>
